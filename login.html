<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в Клиентски Панел | NFC Bulgaria</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="assets/favicon.webp">
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --primary: #00f2ff;
      --primary-glow: rgba(0, 242, 255, 0.4);
      --secondary: #a1e8af;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(0, 242, 255, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 1.5rem;
      position: relative;
    }

    /* Background Glows */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(161, 232, 175, 0.25) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      z-index: 0;
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      z-index: 10;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 28px;
      height: 20px;
      border: 2px solid var(--primary);
      border-radius: 4px;
      position: relative;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .logo-text span {
      color: var(--primary);
    }

    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 242, 255, 0.15);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 12px;
      color: #0b0f19;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 242, 255, 0.2);
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 242, 255, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 0.8rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
    }

    .footer-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .footer-text a {
      color: var(--primary);
      text-decoration: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .profile-cta-hint {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .btn-profile {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      width: 100%;
      padding: 0.85rem 1rem;
      background: transparent;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn-profile:hover {
      background: rgba(0, 242, 255, 0.07);
      border-color: var(--primary);
      box-shadow: 0 0 18px rgba(0, 242, 255, 0.18);
      transform: translateY(-2px);
    }

    .btn-profile svg {
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .btn-profile:hover svg {
      transform: translateX(3px);
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <!-- Logo -->
    <a href="index.html" class="brand">
      <div class="logo-icon"></div>
      <div class="logo-text">NFC<span>Bulgaria</span></div>
    </a>

    <h2 class="title">Вход за клиенти</h2>

    <div id="errorBox" class="error-msg">Имейлът или паролата са грешни.</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Имейл адрес</label>
        <input type="email" id="email" class="form-input" placeholder="office@company.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Парола</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Влез в панела</button>
    </form>

    <p class="footer-text">Имате проблем с входа? <a href="mailto:office@nfcbulgaria.com">Свържете се с нас</a></p>

    <!-- Divider -->
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-text">Нямате карта?</span>
      <span class="divider-line"></span>
    </div>

    <p class="profile-cta-hint">Научете всичко за дигиталния профил&nbsp;—&nbsp;какво включва, как работи и какви данни ще имате на ваше разположение.</p>

    <a href="digital-cards.html" id="btn-see-profile" class="btn-profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      Разгледайте Дигиталния Профил
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

  </div>

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // Supabase Configuration Placeholders (Replaced by user settings)
    const SUPABASE_URL = "https://upjwsqfrblxzhyuxeumj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_xVxRb3L5aI-61IaZgh2LSA_dnmpjREB";

    let supabaseClient = null;
    
    if (SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_KEY !== "YOUR_SUPABASE_ANON_KEY") {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!supabaseClient) {
        errorBox.innerText = "Системата не е конфигурирана. Моля, конфигурирайте API ключовете.";
        errorBox.style.display = 'block';
        return;
      }

      // Real Supabase Auth login
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
      });

      if (error) {
        errorBox.innerText = "Грешна парола или несъществуващ имейл адрес.";
        errorBox.style.display = 'block';
      } else {
        // Successful login - redirect admins to admin.html, clients to dashboard.html
        const ADMIN_EMAILS = ["office@nfcbulgaria.com", "sjv_gold@abv.bg", "demo@nfcbulgaria.com"];
        if (ADMIN_EMAILS.includes(email)) {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      }
    });
  </script>
</body>
</html>
