<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Александър Петров - Дигитална Визитка | NFC Bulgaria</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --primary: #00f2ff;
      --primary-glow: rgba(0, 242, 255, 0.4);
      --secondary: #a1e8af;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(0, 242, 255, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 1.5rem;
      position: relative;
    }

    /* Background Mesh Glows */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      top: -50px;
      left: -100px;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(161, 232, 175, 0.2) 0%, transparent 70%);
      bottom: 50px;
      right: -100px;
      z-index: 0;
      pointer-events: none;
    }

    /* Profile Container */
    .profile-container {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Banner & Avatar */
    .banner {
      height: 120px;
      background: linear-gradient(135deg, #09203f 0%, #537895 100%);
      position: relative;
    }

    .banner::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to top, var(--card-bg), transparent);
    }

    .avatar-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
      margin: -55px auto 0 auto;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 10px 25px rgba(0, 242, 255, 0.3);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--primary);
      border: 3px solid #111827;
    }

    /* Profile Info */
    .profile-info {
      text-align: center;
      padding: 1.5rem 1.5rem 1rem 1.5rem;
    }

    .profile-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.2rem;
    }

    .profile-title {
      font-size: 0.95rem;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
    }

    .profile-company {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .company-badge {
      background: rgba(0, 242, 255, 0.1);
      border: 1px solid var(--glass-border);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Primary CTA Button */
    .btn-save {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 16px;
      color: #0b0f19;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0, 242, 255, 0.25);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .btn-save:active {
      transform: scale(0.97);
    }

    .btn-save::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: all 0.6s ease;
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      30% { left: 100%; }
      100% { left: 100%; }
    }

    /* Action Links Grid */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      padding: 0 1.5rem 1.5rem 1.5rem;
    }

    .link-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .link-item:hover, .link-item:active {
      background: rgba(0, 242, 255, 0.05);
      border-color: var(--glass-border);
      transform: translateY(-2px);
    }

    .link-icon {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }

    .link-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .link-value {
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.7;
      margin-top: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      text-align: center;
    }

    /* Lead Capture Section */
    .lead-section {
      background: rgba(255, 255, 255, 0.02);
      border-top: 1px solid var(--border);
      padding: 1.5rem;
    }

    .lead-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-align: center;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 0.8rem;
    }

    .form-input {
      width: 100%;
      padding: 0.85rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--primary);
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: rgba(0, 242, 255, 0.1);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit:hover, .btn-submit:active {
      background: var(--primary);
      color: #0b0f19;
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    /* Brand Footer */
    .brand-footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      transition: color 0.3s ease;
    }

    .brand-link:hover {
      color: var(--primary);
    }

    .brand-link span {
      color: var(--primary);
      font-weight: 700;
    }

    .logo-mini {
      width: 16px;
      height: 12px;
      border: 1px solid var(--primary);
      border-radius: 2px;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(16, 185, 129, 0.95);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="profile-container">
    
    <!-- Banner Header -->
    <div class="banner"></div>

    <!-- Profile Head -->
    <div class="avatar-wrapper">
      <div class="avatar">АП</div>
    </div>

    <div class="profile-info">
      <h1 class="profile-name">Александър Петров</h1>
      <div class="profile-title">Главен Архитект</div>
      <div class="profile-company">
        <span>АРХПРОЕКТ</span>
        <span class="company-badge">PRO</span>
      </div>
      
      <!-- Primary Save Button -->
      <button class="btn-save" onclick="downloadVCard()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Запази Контакта
      </button>
    </div>

    <!-- Quick Links Grid -->
    <div class="links-grid">
      
      <a href="tel:+359881234567" class="link-item">
        <div class="link-icon">📞</div>
        <div class="link-label">Телефон</div>
        <div class="link-value">+359 88 123 4567</div>
      </a>

      <a href="mailto:a.petrov@arhproekt.bg" class="link-item">
        <div class="link-icon">✉️</div>
        <div class="link-label">Имейл</div>
        <div class="link-value">a.petrov@arhproekt.bg</div>
      </a>

      <a href="https://viber.click/+359881234567" target="_blank" class="link-item">
        <div class="link-icon">💬</div>
        <div class="link-label">Viber</div>
        <div class="link-value">Свържи се</div>
      </a>

      <a href="https://linkedin.com" target="_blank" class="link-item">
        <div class="link-icon">💼</div>
        <div class="link-label">LinkedIn</div>
        <div class="link-value">Профил</div>
      </a>

      <a href="https://nfcbulgaria.com" target="_blank" class="link-item" style="grid-column: span 2;">
        <div class="link-icon">🌐</div>
        <div class="link-label">Уебсайт на Компанията</div>
        <div class="link-value">www.arhproekt.bg</div>
      </a>

    </div>

    <!-- Lead Capture Section -->
    <div class="lead-section">
      <h3 class="lead-title">Изпрати ми твоите контакти</h3>
      <form id="leadForm" onsubmit="submitLead(event)">
        <div class="form-group">
          <input type="text" class="form-input" placeholder="Твоето Име" required>
        </div>
        <div class="form-group">
          <input type="tel" class="form-input" placeholder="Телефон" required>
        </div>
        <button type="submit" class="btn-submit">Изпрати Обратно</button>
      </form>
    </div>

    <!-- Footer Branding -->
    <div class="brand-footer">
      <a href="https://nfcbulgaria.com" target="_blank" class="brand-link">
        Създадено с 
        <div class="logo-mini"></div>
        NFC<span>Bulgaria</span>
      </a>
    </div>

  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">Контакта е записан успешно!</div>

  <script>
    // Dynamic vCard Generation
    function downloadVCard() {
      const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Александър Петров
ORG:АРХПРОЕКТ
TITLE:Главен Архитект
TEL;TYPE=WORK,VOICE:+359881234567
EMAIL;TYPE=PREF,INTERNET:a.petrov@arhproekt.bg
URL:https://nfcbulgaria.com
REV:${new Date().toISOString()}
END:VCARD`;

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'Alexandar_Petrov.vcf';
      
      // iOS / Safari Compatibility Trigger
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      showToast("VCF файла се изтегля...");
    }

    // Lead Submission Mock
    function submitLead(event) {
      event.preventDefault();
      document.getElementById('leadForm').reset();
      showToast("Контакта Ви е изпратен успешно!");
    }

    // Custom Toast Alert
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
